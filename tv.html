<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart TV Interface</title>
    <style>
        body { background: #111; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #screen { width: 80%; height: 60%; border: 10px solid #333; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 3rem; background: black; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .channel-info { text-align: center; }
    </style>
</head>
<body>

    <div id="screen">
        <div class="channel-info" id="display">TV OFF</div>
    </div>

    <script>
        // রিমোটের কমান্ড শোনার জন্য ইভেন্ট লিসেনার
        window.addEventListener('storage', (e) => {
            if (e.key === 'tv_command') {
                const command = e.newValue;
                const display = document.getElementById('display');
                
                if (command === 'power') {
                    display.innerText = display.innerText === "TV OFF" ? "WELCOME" : "TV OFF";
                } else {
                    display.innerText = "Playing: " + command;
                }
            }
        });
    </script>
</body>
</html>
