<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Remote | Full Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .remote { width: 180px; background: #1a1a1a; padding: 40px 20px; border-radius: 50px; border: 2px solid #333; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .d-pad { width: 140px; height: 140px; background: #252525; border-radius: 50%; position: relative; }
        .btn { position: absolute; background: #333; border: none; color: white; border-radius: 10px; cursor: pointer; padding: 10px; }
        .btn:active { background: #4285f4; }

        /* D-Pad Layout */
        .up { top: 5px; left: 50%; transform: translateX(-50%); width: 40px; }
        .down { bottom: 5px; left: 50%; transform: translateX(-50%); width: 40px; }
        .left { left: 5px; top: 50%; transform: translateY(-50%); height: 40px; }
        .right { right: 5px; top: 50%; transform: translateY(-50%); height: 40px; }
        .ok { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; border-radius: 50%; background: #444; font-weight: bold; }

        .extra-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .small-btn { background: #333; color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        .small-btn:active { background: #e74c3c; }
        .youtube { background: white; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <div class="remote">
        <h3 style="margin:0; font-size:14px; color:#666;">GEMINI REMOTE</h3>
        
        <div class="d-pad">
            <button class="btn up" onclick="send('ArrowUp')">▲</button>
            <button class="btn down" onclick="send('ArrowDown')">▼</button>
            <button class="btn left" onclick="send('ArrowLeft')">◀</button>
            <button class="btn right" onclick="send('ArrowRight')">▶</button>
            <button class="btn ok" onclick="send('Enter')">OK</button>
        </div>

        <div class="extra-btns">
            <button class="small-btn" onclick="send('Backspace')">BACK</button>
            <button class="small-btn" onclick="send('Home')">HOME</button>
        </div>

        <div class="extra-btns">
            <button class="small-btn youtube" onclick="send('YouTube_Direct')">YouTube</button>
            <button class="small-btn" onclick="send('Mute')">MUTE</button>
        </div>
    </div>

    <script>
        // আপনার Firebase Config এখানে বসান
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('tv_command');

        function send(cmd) {
            db.set(cmd);
            console.log("Command Sent: " + cmd);
        }
    </script>
</body>
</html>
