<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS | YouTube TV Mode</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #4285f4;
            --card-hover: #ffffff;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 60px;
        }

        .logo {
            font-size: 30px; font-weight: 800;
            background: linear-gradient(to right, #4285f4, #9b51e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .clock { font-size: 24px; opacity: 0.8; }

        .content { padding: 0 60px; }
        .greeting { font-size: 1.2rem; opacity: 0.6; margin-bottom: 5px; }
        .featured-title { font-size: 2.5rem; margin-bottom: 30px; font-weight: bold; }

        .app-grid {
            display: flex; gap: 30px;
            overflow-x: hidden; padding: 25px 0;
            transition: all 0.5s ease;
            scroll-behavior: smooth;
        }

        .app-card {
            min-width: 240px; height: 150px;
            position: relative; background: #1c1c1e;
            border-radius: 18px; overflow: hidden;
            border: 4px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .app-card.active {
            transform: scale(1.15);
            border-color: var(--card-hover);
            box-shadow: 0 15px 45px rgba(255,255,255,0.15);
            background: #2c2c2e;
        }

        .app-logo {
            width: 70%; height: auto; max-height: 80%;
            object-fit: contain; pointer-events: none;
        }

        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 1000;
        }

        .back-btn {
            position: absolute; top: 30px; left: 30px;
            background: rgba(255,255,255,0.2); color: white;
            padding: 12px 25px; border-radius: 50px;
            z-index: 1001; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
            font-weight: bold; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="navbar">
        <div class="logo">GEMINI OS</div>
        <div class="clock" id="time">00:00 AM</div>
    </div>

    <div class="content">
        <div class="greeting" id="greeting-text">Welcome Back</div>
        <div class="featured-title">Smart TV Hub</div>

        <div class="app-grid" id="app-grid">
            <div class="app-card active" id="card-1" onclick="selectAndOpen(1)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
            </div>
            <div class="app-card" id="card-2" onclick="selectAndOpen(2)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
            </div>
            <div class="app-card" id="card-3" onclick="selectAndOpen(3)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_Hotstar_logo.svg" alt="Hotstar">
            </div>
            <div class="app-card" id="card-4" onclick="selectAndOpen(4)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/b/b3/MX_Player_logo_%282019%29.png" alt="MX Player">
            </div>
            <div class="app-card" id="card-5" onclick="selectAndOpen(5)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Zee5_logo.svg" alt="Zee5">
            </div>
            <div class="app-card" id="card-6" onclick="selectAndOpen(6)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/SonyLIV_logo.svg" alt="SonyLIV">
            </div>
            <div class="app-card" id="card-7" onclick="selectAndOpen(7)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/b/bf/JioCinema_Logo.svg" alt="JioCinema">
            </div>
            <div class="app-card" id="card-8" onclick="selectAndOpen(8)">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg" alt="Prime">
            </div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="back-btn" onclick="closeApp()">⬅ BACK TO HOME</div>
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let activeIdx = 1;
        const totalCards = 8;
        
        const videoData = {
            2: '3JZ_D3ELwOQ', 3: 'I2mU-C4Ighw', 4: 'dQw4w9WgXcQ',
            5: '5qap5aO4i9A', 6: 'M7lc1UVf-VE', 7: '98WtmW-ljcE', 8: 'K4TOrB7at0Y'
        };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 1 }
            });
        }

        // কন্ট্রোল ফাংশন
        function selectAndOpen(idx) {
            activeIdx = idx;
            updateUI();
            setTimeout(openApp, 100);
        }

        function openApp() {
            if (activeIdx === 1) {
                // ইউটিউব টিভি মোডে ওপেন হবে
                window.location.href = "https://www.youtube.com/tv";
            } else {
                const vId = videoData[activeIdx];
                document.getElementById('video-overlay').style.display = 'block';
                if (player && player.loadVideoById) player.loadVideoById(vId);
            }
        }

        function closeApp() {
            document.getElementById('video-overlay').style.display = 'none';
            if (player && player.stopVideo) player.stopVideo();
        }

        function navigate(dir) {
            activeIdx += dir;
            if (activeIdx > totalCards) activeIdx = 1;
            if (activeIdx < 1) activeIdx = totalCards;
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.app-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + activeIdx).classList.add('active');
            const grid = document.getElementById('app-grid');
            grid.scrollTo({ left: (activeIdx - 1) * 270 - 100, behavior: 'smooth' });
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") navigate(1);
            if (e.key === "ArrowLeft") navigate(-1);
            if (e.key === "Enter") openApp();
            if (e.key === "Backspace") closeApp();
        });

        window.addEventListener('storage', (e) => {
            if (e.key === 'tv_command') {
                const cmd = e.newValue;
                if (cmd === 'Right') navigate(1);
                if (cmd === 'Left') navigate(-1);
                if (cmd === 'Enter') openApp();
                if (cmd === 'Back') closeApp();
            }
        });

        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
