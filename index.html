<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS | TV Fix</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #4285f4;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* App Grid Layout */
        .app-grid { display: flex; gap: 20px; padding: 50px; }
        .app-card { 
            width: 220px; height: 130px; background: #1c1c1e; 
            border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; border: 4px solid transparent; cursor: pointer; 
        }
        .app-card.active { border-color: white; transform: scale(1.05); transition: 0.3s; }

        /* Video Overlay Fix */
        #video-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            display: none; /* শুরুতে লুকানো থাকবে */
            z-index: 9999;
        }

        /* এটি নিশ্চিত করে যে ইউটিউব প্লেয়ার পুরো স্ক্রিন জুড়ে থাকবে */
        #yt-player {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-grid">
        <div class="app-card active" id="card-1" onclick="GeminiOS.loadVideo('jfKfPfyJRdk')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" width="120">
        </div>
    </div>

    <div id="video-overlay">
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="gemini-os.js"></script>

    <script>
        // ইউটিউব এপিআই রেডি হলে কল হবে
        function onYouTubeIframeAPIReady() {
            if (window.GeminiOS) {
                GeminiOS.initPlayer('yt-player');
                console.log("Player Initialized");
            }
        }

        // কিবোর্ড কন্ট্রোল টেস্ট
        document.addEventListener('keydown', (e) => {
            GeminiOS.executeCommand(e.key);
        });

        // একই ব্রাউজারে রিমোট টেস্ট করার জন্য
        window.addEventListener('storage', (e) => {
            if (e.key === 'gemini_cmd' && e.newValue) {
                GeminiOS.executeCommand(e.newValue);
                localStorage.removeItem('gemini_cmd');
            }
        });
    </script>
</body>
</html>
