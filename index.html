<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS | Premium OTT</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #4285f4;
            --card-hover: #ffffff;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 60px;
        }

        .logo {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(to right, #4285f4, #9b51e0);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .clock { font-size: 24px; opacity: 0.8; }

        .content { padding: 0 60px; }
        .greeting { font-size: 1.2rem; opacity: 0.6; margin-bottom: 5px; }
        .featured-title { font-size: 2.5rem; margin-bottom: 30px; font-weight: bold; }

        /* App Grid */
        .app-grid {
            display: flex; gap: 30px;
            overflow-x: hidden; padding: 20px 0;
            transition: all 0.5s ease;
        }

        .app-card {
            min-width: 220px; height: 140px;
            position: relative;
            background: #1c1c1e;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        .app-card.active {
            transform: scale(1.15);
            border-color: var(--card-hover);
            box-shadow: 0 15px 40px rgba(255,255,255,0.1);
            background: #2c2c2e;
        }

        .app-logo {
            width: 70%; height: auto;
            max-height: 80%;
            object-fit: contain;
            transition: 0.3s;
            filter: grayscale(20%);
        }

        .app-card.active .app-logo {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        /* Video Player Overlay */
        #video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
        }

        .back-hint {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 50px;
            z-index: 1001; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Loading Animation */
        .loader {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="navbar">
        <div class="logo">GEMINI OS</div>
        <div class="clock" id="time">00:00 AM</div>
    </div>

    <div class="content">
        <div class="greeting" id="greeting-text">Welcome</div>
        <div class="featured-title">Featured Apps</div>

        <div class="app-grid" id="app-grid">
            <div class="app-card active" id="card-1">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="YouTube">
            </div>
            <div class="app-card" id="card-2">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
            </div>
            <div class="app-card" id="card-3">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_Hotstar_logo.svg" alt="Hotstar">
            </div>
            <div class="app-card" id="card-4">
                <img class="app-logo" src="https://vignette.wikia.nocookie.net/logopedia/images/b/b3/MX_Player_Logo.png" alt="MX Player">
            </div>
            <div class="app-card" id="card-5">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Zee5_logo.svg" alt="Zee5">
            </div>
            <div class="app-card" id="card-6">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/SonyLIV_logo.svg" alt="SonyLIV">
            </div>
            <div class="app-card" id="card-7">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/b/bf/JioCinema_Logo.svg" alt="JioCinema">
            </div>
            <div class="app-card" id="card-8">
                <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg" alt="Prime">
            </div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="back-hint">Press BACK to exit</div>
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let activeIdx = 1;
        const totalCards = 8;
        
        // YouTube video links for each app
        const videoData = {
            'card-1': 'jfKfPfyJRdk', // YouTube
            'card-2': '3JZ_D3ELwOQ', // Netflix
            'card-3': 'I2mU-C4Ighw', // Hotstar
            'card-4': 'dQw4w9WgXcQ', // MX Player
            'card-5': '5qap5aO4i9A', // Zee5
            'card-6': 'M7lc1UVf-VE', // SonyLIV
            'card-7': '98WtmW-ljcE', // JioCinema
            'card-8': 'K4TOrB7at0Y'  // Prime
        };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 }
            });
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'tv_command') {
                const cmd = e.newValue;
                if (!cmd) return;
                if (cmd === 'Right') navigate(1);
                if (cmd === 'Left') navigate(-1);
                if (cmd === 'Enter') openApp();
                if (cmd === 'Back' || cmd === 'Home') closeApp();
                
                // Hotkeys
                if (cmd === 'Netflix') { activeIdx = 2; updateUI(); openApp(); }
                if (cmd === 'YouTube') { activeIdx = 1; updateUI(); openApp(); }
            }
        });

        function navigate(direction) {
            activeIdx += direction;
            if (activeIdx > totalCards) activeIdx = 1;
            if (activeIdx < 1) activeIdx = totalCards;
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.app-card').forEach(card => card.classList.remove('active'));
            document.getElementById('card-' + activeIdx).classList.add('active');
            
            // Center the active card
            const grid = document.getElementById('app-grid');
            const scrollPos = (activeIdx - 1) * 250; 
            grid.scrollTo({ left: scrollPos, behavior: 'smooth' });
        }

        function openApp() {
            const videoId = videoData['card-' + activeIdx];
            document.getElementById('video-overlay').style.display = 'block';
            player.loadVideoById(videoId);
        }

        function closeApp() {
            document.getElementById('video-overlay').style.display = 'none';
            player.stopVideo();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const hrs = now.getHours();
            let g = "Good Evening";
            if (hrs < 12) g = "Good Morning";
            else if (hrs < 17) g = "Good Afternoon";
            document.getElementById('greeting-text').innerText = g;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
