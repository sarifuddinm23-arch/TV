<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS | Full Remote Control</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #050505; --accent: #4285f4; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Roboto', sans-serif; overflow: hidden; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #050505 100%); z-index: -1; }
        .navbar { display: flex; justify-content: space-between; padding: 30px 60px; }
        .logo { font-size: 32px; font-weight: 900; background: linear-gradient(45deg, #4285f4, #9b51e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock { font-size: 24px; opacity: 0.8; }
        .content { padding: 0 60px; }
        .app-grid { display: flex; gap: 30px; overflow-x: hidden; padding: 30px 0; scroll-behavior: smooth; }
        .app-card { min-width: 260px; height: 160px; background: #1c1c1e; border-radius: 20px; border: 4px solid transparent; transition: 0.4s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .app-card.active { transform: scale(1.15); border-color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .app-logo { width: 65%; pointer-events: none; }
        #video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="navbar">
        <div class="logo">GEMINI OS</div>
        <div class="clock" id="time">00:00 AM</div>
    </div>

    <div class="content">
        <h2>Recommended</h2>
        <div class="app-grid" id="app-grid">
            <div class="app-card active" id="card-1" onclick="selectAndOpen(1)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png"></div>
            <div class="app-card" id="card-2" onclick="selectAndOpen(2)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg"></div>
            <div class="app-card" id="card-3" onclick="selectAndOpen(3)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_Hotstar_logo.svg"></div>
            <div class="app-card" id="card-4" onclick="selectAndOpen(4)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/b/b3/MX_Player_logo_%282019%29.png"></div>
            <div class="app-card" id="card-5" onclick="selectAndOpen(5)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5a/Zee5_logo.svg"></div>
            <div class="app-card" id="card-6" onclick="selectAndOpen(6)"><img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c5/SonyLIV_logo.svg"></div>
        </div>
    </div>

    <div id="video-overlay"><div id="yt-player"></div></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // --- FIREBASE CONFIG (নিজে সেট করুন) ---
        const firebaseConfig = { apiKey: "YOUR_KEY", databaseURL: "YOUR_URL", projectId: "YOUR_ID" };
        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('tv_command');

        let player, activeIdx = 1, isPlaying = false;
        const videoData = { 1:'jfKfPfyJRdk', 2:'3JZ_D3ELwOQ', 3:'I2mU-C4Ighw', 4:'dQw4w9WgXcQ', 5:'5qap5aO4i9A', 6:'M7lc1UVf-VE' };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', { height: '100%', width: '100%', playerVars: { 'autoplay': 1, 'controls': 0 } });
        }

        // --- REMOTE COMMAND LISTENER ---
        dbRef.on('value', (snapshot) => {
            const cmd = snapshot.val();
            if (!cmd) return;

            const isOverlayOpen = document.getElementById('video-overlay').style.display === 'block';

            if (!isOverlayOpen) {
                // হোমে থাকা অবস্থায় কন্ট্রোল
                if (cmd === 'Right') navigate(1);
                if (cmd === 'Left') navigate(-1);
                if (cmd === 'Enter') openApp();
            } else {
                // ভিডিও চলাকালীন কন্ট্রোল
                if (cmd === 'Back') closeApp();
                if (cmd === 'Enter') { // OK বাটন দিয়ে Play/Pause
                    if (isPlaying) { player.pauseVideo(); isPlaying = false; }
                    else { player.playVideo(); isPlaying = true; }
                }
                if (cmd === 'Right') player.seekTo(player.getCurrentTime() + 10); // ১০ সেকেন্ড আগে
                if (cmd === 'Left') player.seekTo(player.getCurrentTime() - 10);  // ১০ সেকেন্ড পিছে
            }
            dbRef.set(null); 
        });

        function navigate(dir) {
            activeIdx += dir;
            if (activeIdx > 6) activeIdx = 1; if (activeIdx < 1) activeIdx = 6;
            document.querySelectorAll('.app-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + activeIdx).classList.add('active');
            document.getElementById('app-grid').scrollTo({ left: (activeIdx - 1) * 290 - 100, behavior: 'smooth' });
        }

        function openApp() {
            document.getElementById('video-overlay').style.display = 'block';
            player.loadVideoById(videoData[activeIdx]);
            isPlaying = true;
        }

        function closeApp() {
            document.getElementById('video-overlay').style.display = 'none';
            player.stopVideo();
            isPlaying = false;
        }

        setInterval(() => { document.getElementById('time').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
