<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini OS | Premium OTT Experience</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #4285f4;
            --card-hover: #ffffff;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #4285f4, #9b51e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clock { font-size: 24px; opacity: 0.8; }

        .content { padding: 0 60px; }
        .greeting { font-size: 1.2rem; opacity: 0.6; margin-bottom: 5px; }
        .featured-title { font-size: 2.5rem; margin-bottom: 30px; font-weight: bold; }

        /* App Grid with Scroll */
        .app-grid {
            display: flex;
            gap: 25px;
            overflow-x: hidden;
            padding: 20px 0;
            transition: all 0.5s ease;
        }

        .app-card {
            min-width: 260px;
            height: 150px;
            position: relative;
            background: #1c1c1e;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            flex-shrink: 0;
        }

        .app-card.active {
            transform: scale(1.15);
            border-color: var(--card-hover);
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .card-img {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.6;
        }

        .app-card.active .card-img { opacity: 1; }

        .card-label {
            position: absolute;
            bottom: 12px;
            left: 15px;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* Video Layer */
        #video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
        }

        .back-hint {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 5px;
            z-index: 1001;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="navbar">
        <div class="logo">GEMINI OS</div>
        <div class="clock" id="time">00:00 AM</div>
    </div>

    <div class="content">
        <div class="greeting" id="greeting-text">Welcome</div>
        <div class="featured-title">Indian OTT & Entertainment</div>

        <div class="app-grid" id="app-grid">
            <div class="app-card active" id="card-1">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/jfKfPfyJRdk/maxresdefault.jpg');"></div>
                <div class="card-label">YouTube</div>
            </div>
            <div class="app-card" id="card-2">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/3JZ_D3ELwOQ/maxresdefault.jpg');"></div>
                <div class="card-label">Netflix</div>
            </div>
            <div class="app-card" id="card-3">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/I2mU-C4Ighw/maxresdefault.jpg');"></div>
                <div class="card-label">Disney+ Hotstar</div>
            </div>
            <div class="app-card" id="card-4">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg');"></div>
                <div class="card-label">MX Player</div>
            </div>
            <div class="app-card" id="card-5">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/5qap5aO4i9A/maxresdefault.jpg');"></div>
                <div class="card-label">Zee5</div>
            </div>
            <div class="app-card" id="card-6">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/M7lc1UVf-VE/maxresdefault.jpg');"></div>
                <div class="card-label">SonyLIV</div>
            </div>
            <div class="app-card" id="card-7">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/98WtmW-ljcE/maxresdefault.jpg');"></div>
                <div class="card-label">JioCinema</div>
            </div>
            <div class="app-card" id="card-8">
                <div class="card-img" style="background-image: url('https://img.youtube.com/vi/K4TOrB7at0Y/maxresdefault.jpg');"></div>
                <div class="card-label">Prime Video</div>
            </div>
        </div>
    </div>

    <div id="video-overlay">
        <div class="back-hint">Press BACK to Home</div>
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let activeIdx = 1;
        const totalCards = 8;
        
        // Video IDs for different apps
        const videoData = {
            'card-1': 'jfKfPfyJRdk', // YouTube Lofi
            'card-2': '3JZ_D3ELwOQ', // Netflix Trailer
            'card-3': 'I2mU-C4Ighw', // Hotstar Special
            'card-4': 'dQw4w9WgXcQ', // MX Player Song
            'card-5': '5qap5aO4i9A', // Zee5 Show
            'card-6': 'M7lc1UVf-VE', // SonyLIV
            'card-7': '98WtmW-ljcE', // JioCinema
            'card-8': 'K4TOrB7at0Y'  // Prime Video
        };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 1, 'controls': 1, 'rel': 0 }
            });
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'tv_command') {
                const cmd = e.newValue;
                if (!cmd) return;
                if (cmd === 'Right') navigate(1);
                if (cmd === 'Left') navigate(-1);
                if (cmd === 'Enter') openApp();
                if (cmd === 'Back' || cmd === 'Home') closeApp();
                
                // Direct Shortcut Keys from Remote
                if (cmd === 'Netflix') { activeIdx = 2; updateUI(); openApp(); }
                if (cmd === 'YouTube') { activeIdx = 1; updateUI(); openApp(); }
            }
        });

        function navigate(direction) {
            activeIdx += direction;
            if (activeIdx > totalCards) activeIdx = 1;
            if (activeIdx < 1) activeIdx = totalCards;
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.app-card').forEach(card => card.classList.remove('active'));
            const activeCard = document.getElementById('card-' + activeIdx);
            activeCard.classList.add('active');
            
            // Auto-scroll logic
            const grid = document.getElementById('app-grid');
            const scrollPos = (activeIdx - 1) * 285; // Card width + gap
            grid.scrollTo({ left: scrollPos, behavior: 'smooth' });
        }

        function openApp() {
            const videoId = videoData['card-' + activeIdx];
            document.getElementById('video-overlay').style.display = 'block';
            player.loadVideoById(videoId);
        }

        function closeApp() {
            document.getElementById('video-overlay').style.display = 'none';
            player.stopVideo();
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const hours = now.getHours();
            let greet = "Good Evening";
            if (hours < 12) greet = "Good Morning";
            else if (hours < 17) greet = "Good Afternoon";
            document.getElementById('greeting-text').innerText = greet;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
