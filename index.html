<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini OS - Android TV</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { 
            background: #1c1c1e; padding: 10px; border-radius: 12px; 
            border: 3px solid transparent; transition: 0.3s; text-align: center;
        }
        .card.active { border-color: #4285f4; transform: scale(1.05); }
        .thumb { height: 120px; background: #333; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #player-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <span>Gemini OS</span>
        <span id="clock">12:00</span>
    </div>

    <div class="grid">
        <div class="card active" id="c1"><div class="thumb" style="background:red">YouTube</div>Live TV</div>
        <div class="card" id="c2"><div class="thumb" style="background:blue">Movies</div>Action</div>
        <div class="card" id="c3"><div class="thumb" style="background:green">Music</div>Songs</div>
        <div class="card" id="c4"><div class="thumb" style="background:purple">Apps</div>Settings</div>
    </div>

    <div id="player-layer">
        <div id="yt-player"></div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let selected = 1;
        const videos = { 1: 'jfKfPfyJRdk', 2: '3JZ_D3ELwOQ', 3: 'dQw4w9WgXcQ', 4: '5qap5aO4i9A' };

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', { height: '100%', width: '100%', playerVars: {'autoplay': 1} });
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'tv_command') {
                const cmd = e.newValue;
                if (cmd === 'Right') move(1);
                if (cmd === 'Left') move(-1);
                if (cmd === 'Enter') play();
                if (cmd === 'Back' || cmd === 'Home') stop();
            }
        });

        function move(dir) {
            document.getElementById('c'+selected).classList.remove('active');
            selected += dir;
            if (selected > 4) selected = 1;
            if (selected < 1) selected = 4;
            document.getElementById('c'+selected).classList.add('active');
        }

        function play() {
            document.getElementById('player-layer').style.display = 'block';
            player.loadVideoById(videos[selected]);
        }

        function stop() {
            document.getElementById('player-layer').style.display = 'none';
            player.stopVideo();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
